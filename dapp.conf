    "description": "Sweep funds out of a compromised webWallet seed without giving up control of this Minima node. The dapp does NOT read your seed — it only runs backup, megammrsync, send and getaddress. Snapshots the host (works on locked vaults), borrows the compromised seed via megammrsync, sweeps balances back to the host's existing address, then restores via megammrsync from the snapshot. Persists state across the two required node restarts. Also includes a tab to set this node up as a MegaMMR host.",
